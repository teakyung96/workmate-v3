# 컨테이너 실행 전용 프로파일 — WAS 주소는 docker-compose 가 주입한다.
# (로컬 IDE 개발은 local 프로파일을 쓰고 이 파일은 컨테이너에서만 활성화된다)
server:
    port: 8080

spring:
    thymeleaf:
        cache: true # 컨테이너(데모/배포)에서는 템플릿 캐시 활성화

was:
    # WAS_BASE_URL 기본값은 compose 서비스명 'was' — 같은 도커 네트워크 안에서 컨테이너명으로 호출한다
    base-url: ${WAS_BASE_URL:http://was:8081}
