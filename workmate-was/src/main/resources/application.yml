# 공통 설정 — 환경별 값(포트, DB 접속 정보)은 application-{local,dev,prod}.yml 에 둔다
spring:
    application:
        name: workmate-was
    profiles:
        active: local # 기본은 로컬 개발, 배포 시 -Dspring.profiles.active 로 전환
    servlet:
        multipart:
            max-file-size: 10MB # 영수증 이미지 업로드 허용 크기 (스프링 기본 1MB로는 사진 업로드 불가)
            max-request-size: 12MB
    jpa:
        hibernate:
            ddl-auto: validate # 스키마는 db/init SQL 스크립트로만 관리 (AI 임의 변경 방지)
        open-in-view: false
    ai:
        google:
            genai:
                api-key: ${GEMINI_API_KEY} # .env → 환경변수 주입 (README 참고)
                chat:
                    options:
                        model: gemini-2.5-flash
                # 임베딩은 채팅과 자동설정이 분리되어 있어 api-key 를 별도로 요구한다
                # (경로 주의: embedding.options.model 이 아니라 embedding.text.options.model)
                # text-embedding-004 는 현재 genai v1beta embedContent 에서 404 → 사용 가능한
                # gemini-embedding-001 로 전환하고, vector_store(768) 에 맞춰 출력 차원을 768 로 고정.
                embedding:
                    api-key: ${GEMINI_API_KEY}
                    text:
                        options:
                            model: gemini-embedding-001
                            dimensions: 768
        vectorstore:
            pgvector:
                initialize-schema: false # 스키마는 db/init/02-schema.sql 로 직접 관리
                index-type: HNSW
                dimensions: 768 # 임베딩 출력 차원(gemini-embedding-001 을 768 로 고정)

# 개인정보(이메일·전화번호) AES-256 암호화 키 — .env 환경변수 주입
# 고정 IV 를 쓰는 결정적 암호화: 같은 평문 → 같은 암호문 (email UK·검색을 위해 필요, v1 방식 이식)
app:
    crypto:
        aes-key: ${AES_SECRET_KEY}
        aes-iv: ${AES_SECRET_IV}
    # 채팅(F2) 설정 — 프롬프트에 포함할 직전 대화 개수(F2-10)·분당 요청 제한(F2-11)
    #                + RAG 유사도 상위 K개·최소 임계값(F4-06)
    chat:
        context-size: 10
        rate-limit-per-minute: 20
        rag-top-k: 4
        rag-threshold: 0.4
