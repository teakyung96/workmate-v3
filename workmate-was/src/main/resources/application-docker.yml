# 컨테이너 실행 전용 프로파일 — 접속 정보는 docker-compose 가 주입하는 환경변수로 채운다.
# (로컬 IDE 개발은 local, 개발 서버는 dev 프로파일을 쓰고 이 파일은 컨테이너에서만 활성화된다)
server:
    port: 8081

spring:
    datasource:
        # DB_HOST 기본값은 compose 서비스명 'db' — 같은 도커 네트워크 안에서 컨테이너명으로 접속한다
        url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
    jpa:
        show-sql: false
